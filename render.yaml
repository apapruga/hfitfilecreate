services:
  - type: web
    name: tg-fit-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BASE_URL
        sync: false
      - key: WEBHOOK_SECRET_PATH
        generateValue: true
      - key: WEBHOOK_SECRET_TOKEN
        generateValue: true
      - key: DEFAULT_TOLERANCE_SEC
        value: 5
